name: Lighthouse CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # Force Node 24 for JS-based actions that haven't been released with
  # Node 24 support yet (Node 20 deprecation 2026-09-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://hargile.be

      - name: Start production server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000/en --timeout 60000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/en
            http://localhost:3000/en/contact
            http://localhost:3000/en/about-us
            http://localhost:3000/en/services
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouserc.json
